<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>River Run — Whitewater Kayak</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0a1a10;color:#e0e8f0;touch-action:none;-webkit-tap-highlight-color:transparent}
canvas{display:block}

/* ── Menu ── */
#menu{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#0b1e15 0%,#163a2c 50%,#0d2818 100%);z-index:100;text-align:center;gap:12px}
#menu h1{font-size:2.6rem;color:#7ec8a3;letter-spacing:.06em;margin-bottom:0}
#menu .subtitle{font-size:1.05rem;color:#8abed4;margin-bottom:10px}
#menu .mode-row{display:flex;gap:16px;margin:6px 0}
#menu .mode-row label{cursor:pointer;padding:8px 18px;border-radius:8px;background:rgba(126,200,167,.12);border:1px solid rgba(126,200,167,.25);transition:background .2s,border-color .2s;font-size:.95rem}
#menu .mode-row input{display:none}
#menu .mode-row input:checked+span{color:#7ec8a3;font-weight:700}
#menu .mode-row label:has(input:checked){background:rgba(126,200,167,.25);border-color:rgba(126,200,167,.5)}
.btn{padding:12px 36px;font-size:1.15rem;border:none;border-radius:10px;cursor:pointer;transition:background .2s,transform .1s;font-weight:600}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#2a8f6c,#3bb58e);color:#fff}
.btn-primary:hover{background:linear-gradient(135deg,#3bb58e,#5cc8a8)}
.btn-secondary{background:rgba(255,255,255,.1);color:#b0d0c8;border:1px solid rgba(255,255,255,.15)}
.btn-secondary:hover{background:rgba(255,255,255,.18)}
#menu .controls-hint{font-size:.82rem;color:#6a9a88;margin-top:14px;line-height:1.7}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;display:none;pointer-events:none;z-index:30;padding:12px 16px}
#hud-top{display:flex;justify-content:space-between;align-items:flex-start}
#speed-box{background:rgba(11,26,20,.75);padding:8px 16px;border-radius:10px;backdrop-filter:blur(4px)}
#speed-val{font-size:1.8rem;font-weight:700;color:#7ec8a3}
#speed-unit{font-size:.75rem;color:#6a9a88}
#heading-box{background:rgba(11,26,20,.75);padding:8px 16px;border-radius:10px;backdrop-filter:blur(4px);text-align:center}
#heading-val{font-size:1.6rem;font-weight:700;color:#d4e8e0}
#heading-lbl{font-size:.7rem;color:#6a9a88}
#stroke-box{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:none;gap:12px;align-items:flex-end;z-index:30;pointer-events:none}
.stroke-col{text-align:center}
.stroke-label{font-size:.65rem;color:#6a9a88;margin-top:4px}
.stroke-track{width:22px;height:70px;background:rgba(255,255,255,.08);border-radius:6px;position:relative;overflow:hidden}
.stroke-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(0deg,#2a8f6c,#7ec8a3);border-radius:6px;transition:height 80ms}
#distance-box{position:fixed;bottom:16px;right:16px;display:none;background:rgba(11,26,20,.75);padding:6px 14px;border-radius:10px;backdrop-filter:blur(4px);z-index:30;pointer-events:none;font-size:.85rem;color:#8abed4}

/* ── Toolbar ── */
#toolbar{position:fixed;top:12px;right:12px;display:none;gap:8px;z-index:40}
.tb{width:36px;height:36px;border:none;border-radius:8px;background:rgba(11,26,20,.75);color:#7ec8a3;font-size:1.05rem;cursor:pointer;backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;transition:background .2s;pointer-events:auto}
.tb:hover{background:rgba(42,143,108,.45)}

/* ── Pause ── */
#pause{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,24,18,.88);z-index:80;gap:14px;backdrop-filter:blur(6px)}
#pause h2{font-size:1.8rem;color:#7ec8a3;margin-bottom:6px}

/* ── Touch controls ── */
#touch{display:none;position:fixed;bottom:0;left:0;right:0;z-index:35;pointer-events:none}
.tz{position:absolute;bottom:16px;border-radius:50%;background:rgba(126,200,167,.1);border:2px solid rgba(126,200,167,.25);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:rgba(126,200,167,.55);pointer-events:auto;user-select:none;-webkit-user-select:none}
.tz:active{background:rgba(126,200,167,.3)}
#tl{left:16px;width:100px;height:100px}
#tr{right:16px;width:100px;height:100px}

/* ── Responsive ── */
@media(max-width:600px){
  #menu h1{font-size:1.7rem}
  #menu .subtitle{font-size:.88rem}
  #speed-val{font-size:1.3rem}
  #heading-val{font-size:1.2rem}
}
</style>
</head>
<body>

<!-- Menu -->
<div id="menu">
  <h1>🏔️ River Run</h1>
  <p class="subtitle">Whitewater kayak — navigate rapids, eddies &amp; stoppers</p>
  <div class="mode-row">
    <label><input type="radio" name="mode" value="arcade" checked><span> Arcade</span></label>
    <label><input type="radio" name="mode" value="simulation"><span> Simulation</span></label>
  </div>
  <button class="btn btn-primary" id="start-btn">Launch Downstream</button>
  <div class="controls-hint">
    <b>Keyboard:</b> A / D = paddle &nbsp; ← → = steer &nbsp; Q / E = lean &nbsp; Esc = pause &nbsp; C = camera<br>
    <b>Mobile:</b> tap left / right zones to paddle
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="hud-top">
    <div id="speed-box"><span id="speed-val">0.0</span> <span id="speed-unit">km/h</span></div>
    <div id="heading-box"><div id="heading-val">000°</div><div id="heading-lbl">HEADING</div></div>
  </div>
</div>
<div id="stroke-box">
  <div class="stroke-col"><div class="stroke-track"><div class="stroke-fill" id="stroke-l"></div></div><div class="stroke-label">L</div></div>
  <div class="stroke-col"><div class="stroke-track"><div class="stroke-fill" id="stroke-r"></div></div><div class="stroke-label">R</div></div>
</div>
<div id="distance-box"><span id="dist-val">0</span> m downstream</div>

<!-- Toolbar -->
<div id="toolbar">
  <button class="tb" id="btn-fs" title="Fullscreen">⛶</button>
  <button class="tb" id="btn-mute" title="Mute">🔊</button>
  <button class="tb" id="btn-pause" title="Pause">⏸</button>
</div>

<!-- Pause -->
<div id="pause">
  <h2>Paused</h2>
  <button class="btn btn-primary" id="resume-btn">Resume</button>
  <button class="btn btn-secondary" id="menu-btn">Main Menu</button>
</div>

<!-- Touch -->
<div id="touch">
  <div class="tz" id="tl">Left<br>Paddle</div>
  <div class="tz" id="tr">Right<br>Paddle</div>
</div>

<script src="three.min.js"></script>
<script>if(typeof THREE==='undefined'){var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js';document.head.appendChild(s);}</script>
<script>
/* ═══════════════════════════════════════════════
   CONFIGURATION
   ═══════════════════════════════════════════════ */
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
const CHUNK_SIZE = 60;
const CHUNKS_AHEAD = 6;
const CHUNKS_BEHIND = 2;
const RIVER_BASE_WIDTH = 16;
const WATER_RES = isMobile ? 6 : 10; // vertices per unit along Z in water mesh
const BANK_HEIGHT = 6;

/* ═══════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════ */
let scene, camera, renderer, clock;
let kayakGroup, paddlePivot, leftBladeMesh, rightBladeMesh;
let waterMesh;
let audioCtx;
const chunks = new Map(); // key: chunkIndex, value: THREE.Group
const rockColliders = []; // {x, z, radius}
const eddyZones = []; // {x, z, radius, strength, angle}

const S = {
  mode: 'arcade',
  playing: false,
  paused: false,
  heading: 0,
  speed: 0,
  angVel: 0,
  lean: 0,
  lStroke: 0,
  rStroke: 0,
  paddleAnim: 0,
  dist: 0,
  camMode: 0,
  orbitAngle: 0,
  posX: 0, posZ: 0, posY: 0,
  velX: 0, velZ: 0,
  lastChunkIdx: -999
};

const input = { left:false, right:false, steerL:false, steerR:false, leanL:false, leanR:false };

/* ═══════════════════════════════════════════════
   NOISE — simple hash-based for deterministic generation
   ═══════════════════════════════════════════════ */
function hash(n) {
  let x = Math.sin(n * 127.1 + 311.7) * 43758.5453;
  return x - Math.floor(x);
}
function hash2(x, y) {
  return hash(x * 157.0 + y * 113.0);
}
function smoothNoise(x) {
  const i = Math.floor(x);
  const f = x - i;
  const t = f * f * (3 - 2 * f);
  return hash(i) * (1 - t) + hash(i + 1) * t;
}

/* ═══════════════════════════════════════════════
   RIVER PATH — deterministic functions
   ═══════════════════════════════════════════════ */
function riverCenterX(z) {
  return 10 * Math.sin(z * 0.007) +
         5 * Math.sin(z * 0.019 + 1.3) +
         3 * Math.sin(z * 0.039 + 2.7) +
         1.5 * Math.sin(z * 0.071 + 0.8);
}

function riverWidth(z) {
  return RIVER_BASE_WIDTH +
         3.5 * Math.sin(z * 0.013 + 0.5) +
         2 * Math.sin(z * 0.031 + 1.8) +
         1.5 * Math.sin(z * 0.057 + 3.1);
}

function riverBaseY(z) {
  // Gradual descent with steeper rapids sections
  return -z * 0.018 +
         0.8 * Math.sin(z * 0.009 + 0.4) +
         0.3 * Math.sin(z * 0.028 + 1.1);
}

function riverGradient(z) {
  // Derivative of riverBaseY — steepness
  const e = 0.5;
  return (riverBaseY(z + e) - riverBaseY(z - e)) / (2 * e);
}

function riverTangent(z) {
  const e = 0.5;
  const dx = riverCenterX(z + e) - riverCenterX(z - e);
  const dz = 2 * e;
  const len = Math.hypot(dx, dz);
  return { x: dx / len, z: dz / len };
}

function isRapids(z) {
  // Rapids sections where gradient is steep
  const g = riverGradient(z);
  return g < -0.025;
}

function turbulence(x, z) {
  // How turbulent the water is at this point
  const cx = riverCenterX(z);
  const w = riverWidth(z);
  const fromCenter = Math.abs(x - cx) / (w * 0.5);
  let turb = 0;
  if (isRapids(z)) turb += 0.6;
  // Near banks = some turbulence
  if (fromCenter > 0.7) turb += (fromCenter - 0.7) * 1.5;
  // Near rocks
  for (const r of rockColliders) {
    const d = Math.hypot(x - r.x, z - r.z);
    if (d < r.radius * 3) {
      turb += (1 - d / (r.radius * 3)) * 0.8;
    }
  }
  return Math.min(turb, 1.0);
}

/* ═══════════════════════════════════════════════
   WATER HEIGHT & CURRENT
   ═══════════════════════════════════════════════ */
function waterH(x, z, t) {
  let h = riverBaseY(z);
  const tang = riverTangent(z);
  const rap = isRapids(z);

  // Flow-aligned ripples
  const flowPhase = tang.x * x + tang.z * z;
  h += 0.06 * Math.sin(flowPhase * 1.8 - t * 3.5);
  h += 0.03 * Math.sin(flowPhase * 3.2 + x * 0.7 - t * 4.2);

  // Standing waves in rapids
  if (rap) {
    h += 0.15 * Math.sin(z * 1.2 - t * 0.5) * Math.cos(x * 0.3);
    h += 0.08 * Math.sin(z * 2.5 + t * 0.3);
  }

  // Cross-river ripples
  h += 0.02 * Math.sin(x * 2.1 + z * 0.5 - t * 2.8);
  h += 0.015 * Math.sin(x * 3.5 - z * 0.8 + t * 3.1);

  return h;
}

function waterNormal(x, z, t) {
  const e = 0.15;
  const c = waterH(x, z, t);
  const nx = -(waterH(x + e, z, t) - c) / e;
  const nz = -(waterH(x, z + e, t) - c) / e;
  const len = Math.hypot(nx, 1, nz);
  return new THREE.Vector3(nx / len, 1 / len, nz / len);
}

function riverCurrent(x, z) {
  const cx = riverCenterX(z);
  const w = riverWidth(z);
  const halfW = w * 0.5;
  const dist = Math.abs(x - cx);

  // Current strongest in center, weakens near banks
  let strength = Math.max(0, 1 - (dist / halfW));
  strength = strength * strength; // Quadratic falloff

  // Steeper = faster current
  const grad = -riverGradient(z);
  const baseSpeed = 1.8 + grad * 30;
  strength *= Math.max(baseSpeed, 0.5);

  const tang = riverTangent(z);

  // Check eddies
  for (const ed of eddyZones) {
    const d = Math.hypot(x - ed.x, z - ed.z);
    if (d < ed.radius) {
      const f = 1 - d / ed.radius;
      const angle = Math.atan2(x - ed.x, z - ed.z) + Math.PI * 0.5;
      return {
        x: Math.sin(angle) * ed.strength * f * 2 - tang.x * strength * f * 0.3,
        z: Math.cos(angle) * ed.strength * f * 2 - tang.z * strength * f * 0.3,
        eddy: f
      };
    }
  }

  return { x: tang.x * strength, z: tang.z * strength, eddy: 0 };
}

/* ═══════════════════════════════════════════════
   THREE.JS SETUP
   ═══════════════════════════════════════════════ */
function init() {
  clock = new THREE.Clock();

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87a5b5);
  scene.fog = new THREE.FogExp2(0x87a5b5, 0.005);

  camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.3, 600);
  camera.position.set(0, 5, -8);

  renderer = new THREE.WebGLRenderer({ antialias: !isMobile });
  renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.5 : 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.15;
  renderer.shadowMap.enabled = !isMobile;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.prepend(renderer.domElement);

  // Lights
  const sun = new THREE.DirectionalLight(0xffeedd, 1.6);
  sun.position.set(40, 80, 60);
  if (!isMobile) {
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 200;
    sun.shadow.camera.left = -50;
    sun.shadow.camera.right = 50;
    sun.shadow.camera.top = 50;
    sun.shadow.camera.bottom = -50;
  }
  scene.add(sun);
  scene.add(new THREE.HemisphereLight(0x8EB5C8, 0x3a5a3a, 0.55));
  scene.add(new THREE.AmbientLight(0x404850, 0.3));

  // Skybox-like background gradient
  createSky();
  createWater();
  createKayak();

  window.addEventListener('resize', onResize);
  setupInput();
  setupMenuEvents();
  animate();
}

/* ═══════════════════════════════════════════════
   SKY
   ═══════════════════════════════════════════════ */
function createSky() {
  const skyGeo = new THREE.SphereGeometry(400, 32, 16);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {},
    vertexShader: `
      varying vec3 vWP;
      void main() {
        vWP = (modelMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * viewMatrix * vec4(vWP, 1.0);
      }
    `,
    fragmentShader: `
      varying vec3 vWP;
      void main() {
        float h = normalize(vWP).y;
        vec3 sky = mix(vec3(0.65, 0.75, 0.82), vec3(0.35, 0.55, 0.78), clamp(h * 2.0, 0.0, 1.0));
        // Hazy horizon
        sky = mix(vec3(0.75, 0.80, 0.82), sky, smoothstep(-0.02, 0.15, h));
        gl_FragColor = vec4(sky, 1.0);
      }
    `
  });
  const sky = new THREE.Mesh(skyGeo, skyMat);
  scene.add(sky);
}

/* ═══════════════════════════════════════════════
   WATER MESH & SHADER
   ═══════════════════════════════════════════════ */
function createWater() {
  const lenZ = (CHUNKS_AHEAD + CHUNKS_BEHIND + 1) * CHUNK_SIZE;
  const segZ = Math.floor(lenZ * (isMobile ? 1.2 : 2));
  const segX = isMobile ? 30 : 50;
  const maxW = RIVER_BASE_WIDTH + 12;

  const geo = new THREE.PlaneGeometry(maxW * 1.5, lenZ, segX, segZ);
  geo.rotateX(-Math.PI / 2);

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uPlayerZ: { value: 0 },
      uSunDir: { value: new THREE.Vector3(0.4, 0.7, 0.5).normalize() },
      fogColor: { value: scene.fog.color },
      fogDensity: { value: scene.fog.density }
    },
    vertexShader: `
      uniform float uTime;
      uniform float uPlayerZ;
      varying vec3 vWP;
      varying vec3 vN;
      varying float vTurb;
      varying float vDepth;

      // River path functions (replicated in shader)
      float riverCenterX(float z) {
        return 10.0 * sin(z * 0.007) +
               5.0 * sin(z * 0.019 + 1.3) +
               3.0 * sin(z * 0.039 + 2.7) +
               1.5 * sin(z * 0.071 + 0.8);
      }
      float riverWidth(float z) {
        return ${RIVER_BASE_WIDTH.toFixed(1)} +
               3.5 * sin(z * 0.013 + 0.5) +
               2.0 * sin(z * 0.031 + 1.8) +
               1.5 * sin(z * 0.057 + 3.1);
      }
      float riverBaseY(float z) {
        return -z * 0.018 +
               0.8 * sin(z * 0.009 + 0.4) +
               0.3 * sin(z * 0.028 + 1.1);
      }
      float riverGradient(float z) {
        float e = 0.5;
        return (riverBaseY(z + e) - riverBaseY(z - e)) / (2.0 * e);
      }
      bool isRapidsF(float z) {
        return riverGradient(z) < -0.025;
      }

      void main() {
        // Position the water mesh around the player
        vec3 basePos = position;
        basePos.z += uPlayerZ;

        float z = basePos.z;
        float cx = riverCenterX(z);
        float w = riverWidth(z);

        // Shift X to follow river center
        float localX = basePos.x + cx;

        // Check if inside river
        float halfW = w * 0.5;
        float fromCenter = abs(localX - cx) / halfW;

        // Water height
        float h = riverBaseY(z);

        // Flow tangent
        float e2 = 0.5;
        float tdx = riverCenterX(z + e2) - riverCenterX(z - e2);
        float tdz = 2.0 * e2;
        float tlen = length(vec2(tdx, tdz));
        vec2 tang = vec2(tdx, tdz) / tlen;

        float flowPhase = tang.x * localX + tang.y * z;

        // Ripples
        h += 0.06 * sin(flowPhase * 1.8 - uTime * 3.5);
        h += 0.03 * sin(flowPhase * 3.2 + localX * 0.7 - uTime * 4.2);

        // Rapids standing waves
        bool rap = isRapidsF(z);
        if (rap) {
          h += 0.18 * sin(z * 1.2 - uTime * 0.5) * cos(localX * 0.3);
          h += 0.10 * sin(z * 2.5 + uTime * 0.3);
        }

        // Cross ripples
        h += 0.02 * sin(localX * 2.1 + z * 0.5 - uTime * 2.8);
        h += 0.015 * sin(localX * 3.5 - z * 0.8 + uTime * 3.1);

        // Bank masking: push vertices outside river below surface
        float bankFade = smoothstep(0.92, 1.05, fromCenter);
        h = mix(h, h - 3.0, bankFade);

        vec3 displaced = vec3(localX, h, z);

        // Normal computation via finite differences
        float e3 = 0.3;
        // Approximate normal
        float hpx = riverBaseY(z) + 0.06 * sin((tang.x * (localX + e3) + tang.y * z) * 1.8 - uTime * 3.5);
        float hpz = riverBaseY(z + e3) + 0.06 * sin((tang.x * localX + tang.y * (z + e3)) * 1.8 - uTime * 3.5);
        vec3 normal = normalize(vec3(-(hpx - h) / e3, 1.0, -(hpz - h) / e3));

        vWP = displaced;
        vN = normal;
        vTurb = rap ? 0.6 : 0.0;
        vTurb += smoothstep(0.7, 0.95, fromCenter) * 0.3;
        vDepth = 1.0 - fromCenter;

        gl_Position = projectionMatrix * viewMatrix * vec4(displaced, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 uSunDir;
      uniform float uTime;
      uniform vec3 fogColor;
      uniform float fogDensity;
      varying vec3 vWP;
      varying vec3 vN;
      varying float vTurb;
      varying float vDepth;

      // Simple noise for foam
      float hash(float n) { return fract(sin(n) * 43758.5453); }
      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        f = f * f * (3.0 - 2.0 * f);
        float n = i.x + i.y * 57.0;
        return mix(mix(hash(n), hash(n+1.0), f.x), mix(hash(n+57.0), hash(n+58.0), f.x), f.y);
      }

      void main() {
        // River water colors
        vec3 shallow = vec3(0.15, 0.45, 0.35);  // Green-teal
        vec3 deep    = vec3(0.04, 0.12, 0.18);  // Dark blue-green
        vec3 rapids  = vec3(0.25, 0.50, 0.45);  // Lighter turbulent

        float depthF = clamp(vDepth, 0.0, 1.0);
        vec3 col = mix(shallow, deep, depthF * 0.6);

        // Rapids coloring
        col = mix(col, rapids, vTurb * 0.4);

        // Foam / white-water
        float foamNoise = noise(vWP.xz * 2.5 + uTime * vec2(0.3, 1.2));
        float foam = smoothstep(0.4, 0.7, vTurb + foamNoise * 0.3);
        foam += smoothstep(0.15, 0.35, vWP.y - (-vWP.z * 0.018 + 0.8 * sin(vWP.z * 0.009 + 0.4))) * 0.3;
        // Animated foam streaks
        float streak = noise(vec2(vWP.x * 1.5, vWP.z * 0.8 - uTime * 2.0));
        foam += streak * vTurb * 0.4;
        foam = clamp(foam, 0.0, 1.0);
        col = mix(col, vec3(0.85, 0.92, 0.95), foam * 0.7);

        // Diffuse lighting
        vec3 n = normalize(vN);
        float diff = max(dot(n, uSunDir), 0.0);
        col *= 0.35 + 0.65 * diff;

        // Specular
        vec3 vd = normalize(cameraPosition - vWP);
        vec3 hd = normalize(uSunDir + vd);
        float spec = pow(max(dot(n, hd), 0.0), 60.0);
        col += vec3(1.0, 0.95, 0.82) * spec * 0.5;

        // Fresnel
        float fres = pow(1.0 - max(dot(n, vd), 0.0), 3.5);
        col = mix(col, vec3(0.45, 0.60, 0.55), fres * 0.3);

        // Fog
        float fd = length(vWP - cameraPosition);
        float ff = 1.0 - exp(-fogDensity * fogDensity * fd * fd);
        col = mix(col, fogColor.rgb, ff);

        gl_FragColor = vec4(col, 0.92);
      }
    `,
    transparent: true,
    side: THREE.DoubleSide,
    depthWrite: true
  });

  waterMesh = new THREE.Mesh(geo, mat);
  scene.add(waterMesh);
}

/* ═══════════════════════════════════════════════
   CHUNK GENERATION — Banks, Rocks, Trees
   ═══════════════════════════════════════════════ */
function generateChunk(chunkIdx) {
  if (chunks.has(chunkIdx)) return;

  const group = new THREE.Group();
  const startZ = chunkIdx * CHUNK_SIZE;
  const endZ = startZ + CHUNK_SIZE;

  // Materials
  const rockMat = new THREE.MeshPhongMaterial({
    color: 0x5a5a52,
    specular: 0x222222,
    shininess: 10,
    flatShading: true
  });
  const rockMat2 = new THREE.MeshPhongMaterial({
    color: 0x6b6358,
    specular: 0x1a1a1a,
    shininess: 8,
    flatShading: true
  });
  const darkRockMat = new THREE.MeshPhongMaterial({
    color: 0x3a3834,
    specular: 0x111111,
    shininess: 6,
    flatShading: true
  });
  const groundMat = new THREE.MeshPhongMaterial({
    color: 0x4a6a3a,
    specular: 0x111111,
    shininess: 5,
    flatShading: true
  });

  // Generate bank walls
  generateBanks(group, startZ, endZ, rockMat, rockMat2, groundMat);

  // Generate rocks in the river
  generateRiverRocks(group, startZ, endZ, darkRockMat, rockMat2);

  // Generate trees on banks
  generateTrees(group, startZ, endZ);

  // Generate ground/hillside
  generateGroundPlanes(group, startZ, endZ, groundMat);

  group.userData.chunkIdx = chunkIdx;
  scene.add(group);
  chunks.set(chunkIdx, group);
}

function generateBanks(group, startZ, endZ, rockMat, rockMat2, groundMat) {
  const step = 2.5;

  for (let z = startZ; z < endZ; z += step) {
    const cx = riverCenterX(z);
    const w = riverWidth(z);
    const halfW = w * 0.5;
    const baseH = riverBaseY(z);

    // Left bank
    createBankSegment(group, cx - halfW, z, step, baseH, -1, rockMat, rockMat2);
    // Right bank
    createBankSegment(group, cx + halfW, z, step, baseH, 1, rockMat, rockMat2);
  }
}

function createBankSegment(group, x, z, depth, baseH, side, rockMat, rockMat2) {
  // Rocky cliff face
  const h = BANK_HEIGHT + hash2(x * 0.1, z * 0.1) * 3;
  const w = 2.5 + hash2(x * 0.3, z * 0.2) * 2;

  // Main cliff block
  const geo = new THREE.BoxGeometry(w, h, depth);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    // Roughen the surface
    const px = pos.getX(i) + hash2(i * 7.1, z * 0.01) * 0.4;
    const py = pos.getY(i) + hash2(i * 3.3, z * 0.02) * 0.3;
    const pz = pos.getZ(i) + hash2(i * 5.7, z * 0.03) * 0.3;
    pos.setX(i, px);
    pos.setY(i, py);
    pos.setZ(i, pz);
  }
  geo.computeVertexNormals();

  const mat = hash2(x, z) > 0.5 ? rockMat : rockMat2;
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x + side * w * 0.5, baseH + h * 0.4, z + depth * 0.5);
  if (!isMobile) {
    mesh.castShadow = true;
    mesh.receiveShadow = true;
  }
  group.add(mesh);

  // Additional rocky outcrops
  if (hash2(x * 0.7, z * 0.5) > 0.4) {
    const oGeo = new THREE.DodecahedronGeometry(0.6 + hash2(z * 0.1, x * 0.2) * 1.2, 0);
    const oMesh = new THREE.Mesh(oGeo, rockMat);
    oMesh.position.set(
      x + side * (0.3 + hash2(x, z * 0.3) * 1.5),
      baseH + hash2(z * 0.2, x * 0.1) * h * 0.6,
      z + hash2(x * 0.5, z * 0.7) * depth
    );
    oMesh.rotation.set(hash(z) * 1.5, hash(x) * 1.5, hash(x + z) * 1.5);
    if (!isMobile) oMesh.castShadow = true;
    group.add(oMesh);
  }
}

function generateRiverRocks(group, startZ, endZ, darkRockMat, rockMat2) {
  // Place rocks in the river
  for (let z = startZ + 3; z < endZ - 3; z += 5) {
    const cx = riverCenterX(z);
    const w = riverWidth(z);
    const seed = hash2(z * 0.13, 42.7);

    // Probability of a rock: higher in rapids
    const rockProb = isRapids(z) ? 0.7 : 0.35;
    if (seed > rockProb) continue;

    // Position within river (avoid very center and very edge)
    const lateralPos = (hash2(z * 0.37, 13.1) - 0.5) * w * 0.65;
    const rx = cx + lateralPos;
    const rz = z + (hash(z * 0.7) - 0.5) * 4;
    const baseH = riverBaseY(rz);

    const size = 0.4 + hash2(z * 0.23, 7.7) * 1.2;
    const above = size * (0.3 + hash(z * 0.31) * 0.5); // How much above water

    // Rock mesh
    const detail = size > 1.0 ? 1 : 0;
    const geo = new THREE.DodecahedronGeometry(size, detail);
    // Flatten slightly
    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      pos.setY(i, pos.getY(i) * 0.6);
      pos.setX(i, pos.getX(i) + hash2(i * 3.1, rz * 0.01) * 0.15);
      pos.setZ(i, pos.getZ(i) + hash2(i * 5.3, rz * 0.02) * 0.15);
    }
    geo.computeVertexNormals();

    const mat = hash(z * 0.5) > 0.5 ? darkRockMat : rockMat2;
    const rock = new THREE.Mesh(geo, mat);
    rock.position.set(rx, baseH + above * 0.5, rz);
    rock.rotation.set(hash(z) * 0.5, hash(z + 1) * Math.PI * 2, hash(z + 2) * 0.3);
    if (!isMobile) {
      rock.castShadow = true;
      rock.receiveShadow = true;
    }
    group.add(rock);

    // Add to colliders
    rockColliders.push({ x: rx, z: rz, radius: size * 0.9 });

    // Create eddy behind the rock (downstream)
    if (size > 0.7) {
      const tang = riverTangent(rz);
      eddyZones.push({
        x: rx + tang.x * size * 2.2,
        z: rz + tang.z * size * 2.2,
        radius: size * 2.5,
        strength: size * 0.6,
        angle: 0
      });
    }

    // Sometimes add a second smaller rock nearby
    if (hash2(z * 0.19, 33.3) > 0.55) {
      const s2 = size * 0.5;
      const geo2 = new THREE.DodecahedronGeometry(s2, 0);
      const pos2 = geo2.attributes.position;
      for (let i = 0; i < pos2.count; i++) pos2.setY(i, pos2.getY(i) * 0.55);
      geo2.computeVertexNormals();
      const r2 = new THREE.Mesh(geo2, mat);
      r2.position.set(
        rx + (hash(z * 1.1) - 0.5) * 2,
        baseH + s2 * 0.3,
        rz + (hash(z * 1.3) - 0.5) * 2
      );
      r2.rotation.set(hash(z * 2) * 1, hash(z * 3) * 2, 0);
      if (!isMobile) r2.castShadow = true;
      group.add(r2);
      rockColliders.push({
        x: r2.position.x,
        z: r2.position.z,
        radius: s2 * 0.8
      });
    }
  }
}

function generateTrees(group, startZ, endZ) {
  const trunkMat = new THREE.MeshPhongMaterial({ color: 0x5a3a20 });
  const leafMats = [
    new THREE.MeshPhongMaterial({ color: 0x2a6a2a, flatShading: true }),
    new THREE.MeshPhongMaterial({ color: 0x3a7a35, flatShading: true }),
    new THREE.MeshPhongMaterial({ color: 0x1d5a25, flatShading: true })
  ];

  for (let z = startZ; z < endZ; z += 3) {
    const cx = riverCenterX(z);
    const w = riverWidth(z);
    const halfW = w * 0.5;
    const baseH = riverBaseY(z);

    // Left bank trees
    if (hash2(z * 0.17, 22.1) > 0.35) {
      const tx = cx - halfW - 2 - hash(z * 0.41) * 5;
      createTree(group, tx, baseH + BANK_HEIGHT * 0.5 + hash(z * 0.51) * 2, z + hash(z * 0.61) * 3, trunkMat, leafMats, hash(z * 0.71));
    }

    // Right bank trees
    if (hash2(z * 0.19, 33.7) > 0.35) {
      const tx = cx + halfW + 2 + hash(z * 0.43) * 5;
      createTree(group, tx, baseH + BANK_HEIGHT * 0.5 + hash(z * 0.53) * 2, z + hash(z * 0.63) * 3, trunkMat, leafMats, hash(z * 0.73));
    }
  }
}

function createTree(group, x, y, z, trunkMat, leafMats, seed) {
  const treeGroup = new THREE.Group();
  const height = 2.5 + seed * 4;
  const radius = 0.8 + seed * 1.5;

  // Trunk
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.1, 0.18, height * 0.4, 5),
    trunkMat
  );
  trunk.position.y = height * 0.2;
  treeGroup.add(trunk);

  // Canopy layers (pine-tree style cones)
  const leafMat = leafMats[Math.floor(seed * leafMats.length) % leafMats.length];
  const layers = 2 + Math.floor(seed * 2);
  for (let i = 0; i < layers; i++) {
    const f = i / layers;
    const coneH = height * 0.35 * (1 - f * 0.3);
    const coneR = radius * (1 - f * 0.4);
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(coneR, coneH, 6),
      leafMat
    );
    cone.position.y = height * 0.35 + i * height * 0.2;
    if (!isMobile) cone.castShadow = true;
    treeGroup.add(cone);
  }

  treeGroup.position.set(x, y, z);
  treeGroup.rotation.y = seed * Math.PI * 2;
  group.add(treeGroup);
}

function generateGroundPlanes(group, startZ, endZ, groundMat) {
  // Ground strips alongside the river on each side
  const step = CHUNK_SIZE;
  for (let side = -1; side <= 1; side += 2) {
    const geo = new THREE.PlaneGeometry(30, step, 4, 8);
    geo.rotateX(-Math.PI / 2);
    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const lz = pos.getZ(i) + startZ + step * 0.5;
      const cx = riverCenterX(lz);
      const w = riverWidth(lz);
      const halfW = w * 0.5;
      const baseH = riverBaseY(lz);

      const gx = pos.getX(i) * side + cx + side * (halfW + 15);
      pos.setX(i, gx);
      pos.setY(i, baseH + BANK_HEIGHT * 0.4 + hash2(gx * 0.1, lz * 0.1) * 2);
      pos.setZ(i, lz);
    }
    geo.computeVertexNormals();

    const gMesh = new THREE.Mesh(geo, groundMat);
    if (!isMobile) gMesh.receiveShadow = true;
    group.add(gMesh);
  }
}

function removeChunk(chunkIdx) {
  const group = chunks.get(chunkIdx);
  if (!group) return;

  // Remove colliders and eddies for this chunk
  const startZ = chunkIdx * CHUNK_SIZE;
  const endZ = startZ + CHUNK_SIZE;

  for (let i = rockColliders.length - 1; i >= 0; i--) {
    if (rockColliders[i].z >= startZ && rockColliders[i].z < endZ) {
      rockColliders.splice(i, 1);
    }
  }
  for (let i = eddyZones.length - 1; i >= 0; i--) {
    if (eddyZones[i].z >= startZ && eddyZones[i].z < endZ) {
      eddyZones.splice(i, 1);
    }
  }

  // Dispose geometries and materials
  group.traverse(child => {
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
      else child.material.dispose();
    }
  });

  scene.remove(group);
  chunks.delete(chunkIdx);
}

function updateChunks() {
  const currentChunk = Math.floor(S.posZ / CHUNK_SIZE);
  if (currentChunk === S.lastChunkIdx) return;
  S.lastChunkIdx = currentChunk;

  // Generate chunks ahead
  for (let i = -CHUNKS_BEHIND; i <= CHUNKS_AHEAD; i++) {
    generateChunk(currentChunk + i);
  }

  // Remove far chunks
  for (const [idx] of chunks) {
    if (idx < currentChunk - CHUNKS_BEHIND - 1 || idx > currentChunk + CHUNKS_AHEAD + 1) {
      removeChunk(idx);
    }
  }
}

/* ═══════════════════════════════════════════════
   KAYAK MODEL
   ═══════════════════════════════════════════════ */
function createKayak() {
  kayakGroup = new THREE.Group();

  // Hull — tapered box
  const hGeo = new THREE.BoxGeometry(3.2, 0.22, 0.52, 16, 1, 4);
  const pos = hGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const taper = 1.0 - Math.pow(Math.abs(x) / 1.6, 2.2) * 0.8;
    pos.setZ(i, pos.getZ(i) * Math.max(taper, 0.08));
    if (pos.getY(i) < 0) pos.setY(i, pos.getY(i) - (1 - taper) * 0.08);
  }
  hGeo.computeVertexNormals();
  const hMat = new THREE.MeshPhongMaterial({ color: 0xcc2828, specular: 0x444444, shininess: 50 });
  const hull = new THREE.Mesh(hGeo, hMat);
  if (!isMobile) hull.castShadow = true;
  kayakGroup.add(hull);

  // Deck stripe
  const dGeo = new THREE.BoxGeometry(2.4, 0.04, 0.36, 12, 1, 1);
  const dp = dGeo.attributes.position;
  for (let i = 0; i < dp.count; i++) {
    const x = dp.getX(i);
    const taper = 1.0 - Math.pow(Math.abs(x) / 1.2, 2) * 0.7;
    dp.setZ(i, dp.getZ(i) * Math.max(taper, 0.15));
  }
  dGeo.computeVertexNormals();
  const deck = new THREE.Mesh(dGeo, new THREE.MeshPhongMaterial({ color: 0xe03838 }));
  deck.position.y = 0.12;
  kayakGroup.add(deck);

  // Cockpit rim
  const rGeo = new THREE.TorusGeometry(0.19, 0.025, 8, 20);
  rGeo.rotateX(Math.PI / 2);
  const rim = new THREE.Mesh(rGeo, new THREE.MeshPhongMaterial({ color: 0x222222 }));
  rim.position.y = 0.14;
  kayakGroup.add(rim);

  // Seat
  const sGeo = new THREE.BoxGeometry(0.25, 0.03, 0.28);
  const seat = new THREE.Mesh(sGeo, new THREE.MeshPhongMaterial({ color: 0x333333 }));
  seat.position.y = 0.09;
  seat.position.x = -0.05;
  kayakGroup.add(seat);

  // Paddle
  paddlePivot = new THREE.Group();
  paddlePivot.position.set(0, 0.32, 0);

  const shaft = new THREE.Mesh(
    new THREE.CylinderGeometry(0.014, 0.014, 1.7, 8),
    new THREE.MeshPhongMaterial({ color: 0x444444 })
  );
  shaft.rotation.z = Math.PI / 2;
  paddlePivot.add(shaft);

  const bladeMat = new THREE.MeshPhongMaterial({ color: 0x1a6fa0, specular: 0x333333, shininess: 30 });
  leftBladeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.30, 0.13), bladeMat);
  leftBladeMesh.position.set(-0.90, -0.02, 0);
  paddlePivot.add(leftBladeMesh);

  rightBladeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.30, 0.13), bladeMat.clone());
  rightBladeMesh.position.set(0.90, -0.02, 0);
  paddlePivot.add(rightBladeMesh);

  kayakGroup.add(paddlePivot);
  scene.add(kayakGroup);
}

/* ═══════════════════════════════════════════════
   PHYSICS
   ═══════════════════════════════════════════════ */
function updatePhysics(dt, t) {
  const isArcade = S.mode === 'arcade';
  const thrust = isArcade ? 6.0 : 4.5;
  const turnF = isArcade ? 2.2 : 3.0;
  const drag = 0.45;
  const aDrag = 2.5;

  // Paddle strokes
  if (input.left)  S.lStroke = Math.min(S.lStroke + dt * 5, 1);
  else             S.lStroke = Math.max(S.lStroke - dt * 4, 0);
  if (input.right) S.rStroke = Math.min(S.rStroke + dt * 5, 1);
  else             S.rStroke = Math.max(S.rStroke - dt * 4, 0);

  // Get current at player position
  const cur = riverCurrent(S.posX, S.posZ);

  // Apply river current to velocity
  S.velX += cur.x * dt * 2.0;
  S.velZ += cur.z * dt * 2.0;

  // Paddle thrust (in facing direction)
  const lf = input.left ? 1 : 0;
  const rf = input.right ? 1 : 0;
  const thrustMag = (lf + rf) * thrust * dt;
  S.velX += Math.sin(S.heading) * thrustMag;
  S.velZ += Math.cos(S.heading) * thrustMag;

  // Turning from strokes
  if (isArcade) {
    S.angVel -= lf * turnF * dt * 0.5;
    S.angVel += rf * turnF * dt * 0.5;
  } else {
    S.angVel += lf * turnF * dt * 0.5;
    S.angVel -= rf * turnF * dt * 0.5;
  }

  // Arrow key steering
  if (input.steerL) S.angVel -= (isArcade ? 2.5 : 1.2) * dt;
  if (input.steerR) S.angVel += (isArcade ? 2.5 : 1.2) * dt;

  // Lean
  let targetLean = 0;
  if (input.leanL) targetLean = -1;
  if (input.leanR) targetLean = 1;
  S.lean += (targetLean - S.lean) * Math.min(dt * 4, 1);

  // Drag
  S.velX *= Math.max(1 - drag * dt, 0);
  S.velZ *= Math.max(1 - drag * dt, 0);
  S.angVel *= Math.max(1 - aDrag * dt, 0);

  // Eddy effect: if in eddy, slow down and gentle rotation
  if (cur.eddy > 0.3) {
    S.velX *= 1 - cur.eddy * dt * 2;
    S.velZ *= 1 - cur.eddy * dt * 2;
    S.angVel += cur.eddy * dt * 0.5;
  }

  // Bank collision — keep kayak in river
  const cx = riverCenterX(S.posZ);
  const w = riverWidth(S.posZ);
  const halfW = w * 0.5 - 0.5; // margin
  const fromCenter = S.posX - cx;
  if (Math.abs(fromCenter) > halfW) {
    const pushDir = fromCenter > 0 ? -1 : 1;
    S.velX += pushDir * dt * 12;
    S.posX = cx + Math.sign(fromCenter) * halfW;
    // Bounce off bank
    S.velX *= -0.3;
    S.speed *= 0.8;
  }

  // Rock collision
  for (const rock of rockColliders) {
    const dx = S.posX - rock.x;
    const dz = S.posZ - rock.z;
    const dist = Math.hypot(dx, dz);
    const minDist = rock.radius + 0.5; // kayak half-width
    if (dist < minDist && dist > 0.01) {
      // Push away
      const nx = dx / dist;
      const nz = dz / dist;
      const overlap = minDist - dist;
      S.posX += nx * overlap * 1.2;
      S.posZ += nz * overlap * 1.2;
      // Reflect velocity
      const dot = S.velX * nx + S.velZ * nz;
      if (dot < 0) {
        S.velX -= 2 * dot * nx * 0.5;
        S.velZ -= 2 * dot * nz * 0.5;
      }
      // Speed loss
      S.velX *= 0.6;
      S.velZ *= 0.6;
    }
  }

  // Speed clamp
  const spd = Math.hypot(S.velX, S.velZ);
  if (spd > 14) {
    S.velX *= 14 / spd;
    S.velZ *= 14 / spd;
  }
  S.speed = spd;

  // Integrate heading
  S.heading += S.angVel * dt;

  // Integrate position
  S.posX += S.velX * dt;
  S.posZ += S.velZ * dt;
  S.dist = S.posZ; // distance downstream

  // Water height + tilt
  S.posY = waterH(S.posX, S.posZ, t);
  const n = waterNormal(S.posX, S.posZ, t);

  // Apply to kayak group
  kayakGroup.position.set(S.posX, S.posY, S.posZ);
  kayakGroup.rotation.y = S.heading;

  // Tilt kayak with water surface + lean
  const pitch = Math.atan2(n.z, n.y) * 0.6;
  const roll = Math.atan2(n.x, n.y) * 0.6 + S.lean * 0.18;
  kayakGroup.rotation.x = pitch;
  kayakGroup.rotation.z = roll;

  // Paddle animation
  let targetPaddle = 0;
  if (input.left && !input.right) targetPaddle = -0.7;
  if (input.right && !input.left) targetPaddle = 0.7;
  S.paddleAnim += (targetPaddle - S.paddleAnim) * Math.min(dt * 10, 1);
  paddlePivot.rotation.x = S.paddleAnim;

  // Update chunks
  updateChunks();
}

/* ═══════════════════════════════════════════════
   CAMERA
   ═══════════════════════════════════════════════ */
const camSmooth = { x: 0, y: 5, z: -8 };

function updateCamera(dt) {
  let offX, offY, offZ;

  if (S.camMode === 0) { // Third-person behind
    offX = 0; offY = 2.8; offZ = -5.5;
  } else if (S.camMode === 1) { // First-person cockpit
    offX = 0; offY = 0.6; offZ = 0.3;
  } else { // Orbit
    S.orbitAngle += dt * 0.25;
    offX = Math.sin(S.orbitAngle) * 7;
    offY = 3.5;
    offZ = Math.cos(S.orbitAngle) * 7;
  }

  // Rotate offset by heading
  const cosH = Math.cos(S.heading), sinH = Math.sin(S.heading);
  const rx = offX * cosH + offZ * sinH;
  const rz = -offX * sinH + offZ * cosH;

  const tx = S.posX + rx;
  const ty = S.posY + offY;
  const tz = S.posZ + rz;

  const lerp = 1 - Math.pow(0.005, dt);
  camSmooth.x += (tx - camSmooth.x) * lerp;
  camSmooth.y += (ty - camSmooth.y) * lerp;
  camSmooth.z += (tz - camSmooth.z) * lerp;

  camera.position.set(camSmooth.x, camSmooth.y, camSmooth.z);

  // Look slightly ahead of the kayak (downstream)
  const lookAhead = 3;
  const tang = riverTangent(S.posZ);
  camera.lookAt(
    S.posX + tang.x * lookAhead,
    S.posY + 0.3,
    S.posZ + tang.z * lookAhead
  );
}

/* ═══════════════════════════════════════════════
   HUD
   ═══════════════════════════════════════════════ */
const elSpeed = () => document.getElementById('speed-val');
const elHeading = () => document.getElementById('heading-val');
const elStrokeL = () => document.getElementById('stroke-l');
const elStrokeR = () => document.getElementById('stroke-r');
const elDist = () => document.getElementById('dist-val');

function updateHUD() {
  const kmh = S.speed * 3.6;
  elSpeed().textContent = kmh.toFixed(1);
  let deg = ((S.heading * 180 / Math.PI) % 360 + 360) % 360;
  elHeading().textContent = String(Math.round(deg)).padStart(3, '0') + '°';
  elStrokeL().style.height = (S.lStroke * 100) + '%';
  elStrokeR().style.height = (S.rStroke * 100) + '%';
  elDist().textContent = Math.max(0, Math.round(S.dist));
}

/* ═══════════════════════════════════════════════
   GAME LOOP
   ═══════════════════════════════════════════════ */
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.getElapsedTime();

  // Update water shader
  waterMesh.material.uniforms.uTime.value = t;
  waterMesh.material.uniforms.uPlayerZ.value = S.posZ;

  // Reposition water mesh to follow player
  waterMesh.position.z = S.posZ;

  if (S.playing && !S.paused) {
    updatePhysics(dt, t);
    updateCamera(dt);
    updateHUD();

    // Update sun shadow to follow player
    const sunLight = scene.children.find(c => c.isDirectionalLight);
    if (sunLight && sunLight.shadow) {
      sunLight.position.set(S.posX + 40, S.posY + 80, S.posZ + 60);
      sunLight.target.position.set(S.posX, S.posY, S.posZ);
      sunLight.target.updateMatrixWorld();
    }
  } else {
    // Menu idle: orbit camera over the river start
    const ix = riverCenterX(20) + Math.sin(t * 0.15) * 6;
    const iy = riverBaseY(20) + 6;
    const iz = 20 + Math.cos(t * 0.15) * 8;
    camera.position.set(ix, iy, iz);
    camera.lookAt(riverCenterX(25), riverBaseY(25), 25);

    // Generate initial chunks for menu view
    for (let i = -1; i <= 4; i++) {
      generateChunk(i);
    }
  }

  renderer.render(scene, camera);
}

/* ═══════════════════════════════════════════════
   INPUT
   ═══════════════════════════════════════════════ */
function setupInput() {
  document.addEventListener('keydown', e => {
    if (e.repeat) return;
    switch (e.code) {
      case 'KeyA':       input.left = true; break;
      case 'KeyD':       input.right = true; break;
      case 'ArrowLeft':  input.steerL = true; break;
      case 'ArrowRight': input.steerR = true; break;
      case 'KeyQ':       input.leanL = true; break;
      case 'KeyE':       input.leanR = true; break;
      case 'KeyC':       if (S.playing) { S.camMode = (S.camMode + 1) % 3; } break;
      case 'Escape':     if (S.playing) togglePause(); break;
    }
  });
  document.addEventListener('keyup', e => {
    switch (e.code) {
      case 'KeyA':       input.left = false; break;
      case 'KeyD':       input.right = false; break;
      case 'ArrowLeft':  input.steerL = false; break;
      case 'ArrowRight': input.steerR = false; break;
      case 'KeyQ':       input.leanL = false; break;
      case 'KeyE':       input.leanR = false; break;
    }
  });

  const tl = document.getElementById('tl');
  const tr = document.getElementById('tr');
  tl.addEventListener('touchstart', e => { e.preventDefault(); input.left = true; }, { passive: false });
  tl.addEventListener('touchend', e => { e.preventDefault(); input.left = false; }, { passive: false });
  tr.addEventListener('touchstart', e => { e.preventDefault(); input.right = true; }, { passive: false });
  tr.addEventListener('touchend', e => { e.preventDefault(); input.right = false; }, { passive: false });
}

/* ═══════════════════════════════════════════════
   MENU / PAUSE
   ═══════════════════════════════════════════════ */
function showUI(playing) {
  document.getElementById('hud').style.display = playing ? 'block' : 'none';
  document.getElementById('stroke-box').style.display = playing ? 'flex' : 'none';
  document.getElementById('distance-box').style.display = playing ? 'block' : 'none';
  document.getElementById('toolbar').style.display = playing ? 'flex' : 'none';
  if (isMobile) document.getElementById('touch').style.display = playing ? 'block' : 'none';
}

function startGame() {
  S.mode = document.querySelector('input[name="mode"]:checked').value;
  S.playing = true; S.paused = false;
  S.posX = riverCenterX(0);
  S.posZ = 5;
  S.posY = riverBaseY(5);
  S.heading = 0;
  S.speed = 0;
  S.velX = 0; S.velZ = 0;
  S.angVel = 0; S.lean = 0;
  S.lStroke = 0; S.rStroke = 0; S.paddleAnim = 0;
  S.dist = 0; S.camMode = 0; S.orbitAngle = 0;
  S.lastChunkIdx = -999;

  // Clear old chunks
  for (const [idx] of chunks) removeChunk(idx);
  rockColliders.length = 0;
  eddyZones.length = 0;

  camSmooth.x = S.posX;
  camSmooth.y = S.posY + 5;
  camSmooth.z = S.posZ - 8;

  document.getElementById('menu').style.display = 'none';
  document.getElementById('pause').style.display = 'none';
  showUI(true);
  initAudio();

  // Generate initial chunks
  updateChunks();
}

function togglePause() {
  S.paused = !S.paused;
  document.getElementById('pause').style.display = S.paused ? 'flex' : 'none';
}

function returnToMenu() {
  S.playing = false; S.paused = false;
  document.getElementById('pause').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
  showUI(false);
}

function setupMenuEvents() {
  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('resume-btn').addEventListener('click', togglePause);
  document.getElementById('menu-btn').addEventListener('click', returnToMenu);
  document.getElementById('btn-pause').addEventListener('click', togglePause);

  document.getElementById('btn-fs').addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen();
  });

  let muted = false;
  document.getElementById('btn-mute').addEventListener('click', function () {
    muted = !muted;
    this.textContent = muted ? '🔇' : '🔊';
    if (audioCtx) {
      if (muted) audioCtx.suspend(); else audioCtx.resume();
    }
  });
}

/* ═══════════════════════════════════════════════
   AUDIO — procedural river sounds
   ═══════════════════════════════════════════════ */
function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // River rushing sound — filtered noise with character
    const bufSize = audioCtx.sampleRate * 2;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      data[i] = (Math.random() * 2 - 1) * 0.35;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.loop = true;

    // Bandpass filter for river sound
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 600;
    bp.Q.value = 0.8;

    // Low-pass for rumble
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 1200;

    const gain = audioCtx.createGain();
    gain.gain.value = 0.15;

    src.connect(bp).connect(lp).connect(gain).connect(audioCtx.destination);
    src.start();

    // Add a second layer — higher frequency splash
    const buf2 = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data2 = buf2.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      data2[i] = (Math.random() * 2 - 1) * 0.15;
    }
    const src2 = audioCtx.createBufferSource();
    src2.buffer = buf2;
    src2.loop = true;

    const hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 2000;

    const gain2 = audioCtx.createGain();
    gain2.gain.value = 0.06;

    src2.connect(hp).connect(gain2).connect(audioCtx.destination);
    src2.start();
  } catch (_) {}
}

/* ═══════════════════════════════════════════════
   RESIZE
   ═══════════════════════════════════════════════ */
function onResize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

/* ═══════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════ */
init();
</script>
